# ─────────────────────────────────────────────────────────────
# keep-alive.yml — Ping Render backend mỗi 14 phút
# Ngăn Render Free Tier không ngủ sau 15 phút idle
#
# SETUP: Thêm secret RENDER_URL vào GitHub repo:
# Settings → Secrets → Actions → New repository secret
# Name: RENDER_URL
# Value: https://your-app-name.onrender.com
# ─────────────────────────────────────────────────────────────
name: 🔄 Keep InfiniNote Alive

on:
  schedule:
    # Chạy mỗi 14 phút, 24/7
    - cron: '*/14 * * * *'
  # Cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:

jobs:
  ping:
    name: Ping Backend
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 🏓 Ping Render Server
        run: |
          echo "⏰ $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          STATUS=$(curl --silent --write-out "%{http_code}" \
            --output /dev/null \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            "${{ secrets.RENDER_URL }}/")
          
          echo "📡 HTTP Status: $STATUS"
          
          if [ "$STATUS" = "200" ]; then
            echo "✅ Server is alive and running!"
          else
            echo "⚠️ Unexpected status: $STATUS — Server may be cold-starting"
          fi
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
